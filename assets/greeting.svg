<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 900 55'
    style='background-color: #00000000;'
    width='900px' height='55px'>

    <path id='path0'>
        <!-- Single line -->
        <animate id='d0' attributeName='d' begin='0s'
            dur='6000ms' fill='freeze'
            values='m0,28 h0 ; m0,28 h900 ; m0,28 h900 ; m0,28 h900' keyTimes='0;0.66666666666667;0.83333333333333;1' />
    </path>
    <text font-family='"Arial", monospace' fill='#000000' font-size='40'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            👋 Hello, I&#039;m Novarisea (BK-1107)
        </textPath>
    </text>
</svg>
